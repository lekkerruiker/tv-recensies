name: Dagelijkse Recensies
on:
  schedule:
    # 06:00 UTC is 08:00 in de Nederlandse zomertijd (maart t/m oktober)
    # Als het wintertijd is, komt deze mail om 07:00 uur. 
    # Wil je hem ook in de winter stipt om 08:00, dan moet dit '0 7 * * *' worden.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  stuur-recensies:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install requests beautifulsoup4 resend

      - name: Script draaien
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python main.py
