# ... (rest van de file blijft hetzelfde tot aan 'Dependencies installeren')
      - name: Dependencies installeren
        run: |
          pip install requests beautifulsoup4 resend # Voeg resend hier toe

      - name: Script draaien
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python main.py
